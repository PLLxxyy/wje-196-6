<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宠物合成养成</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #0f1923;
        --card: #1a2a3a;
        --card-hover: #243444;
        --border: #2a3a4a;
        --text: #e8e8e8;
        --text-dim: #8899aa;
        --gold: #ffd700;
        --gold-dim: #b8960f;
        --accent: #4fc3f7;
        --success: #66bb6a;
        --danger: #ef5350;
        --common: #9e9e9e;
        --uncommon: #66bb6a;
        --rare: #42a5f5;
        --epic: #ab47bc;
        --legendary: #ffa726;
        --mythic: #ef5350;
        --supreme: #ffd700;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        overflow-x: hidden;
      }

      #root { min-height: 100vh; display: flex; flex-direction: column; }

      /* ===== HEADER ===== */
      .header {
        background: linear-gradient(135deg, #1a2a3a 0%, #0f1923 100%);
        border-bottom: 1px solid var(--border);
        padding: 12px 16px;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
      }
      .header-title {
        font-size: 20px;
        font-weight: 700;
        background: linear-gradient(135deg, #ffd700, #ff9800);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .header-stats {
        display: flex;
        gap: 16px;
        align-items: center;
      }
      .stat-item {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 14px;
        font-weight: 600;
      }
      .stat-icon { font-size: 16px; }
      .stat-gold { color: var(--gold); }

      .nav-tabs {
        display: flex;
        gap: 4px;
        background: rgba(0,0,0,0.3);
        border-radius: 10px;
        padding: 3px;
      }
      .nav-tab {
        flex: 1;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: transparent;
        color: var(--text-dim);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
      }
      .nav-tab:hover { color: var(--text); background: rgba(255,255,255,0.05); }
      .nav-tab.active {
        background: linear-gradient(135deg, #4fc3f7, #29b6f6);
        color: #fff;
        box-shadow: 0 2px 8px rgba(79,195,247,0.3);
      }

      /* ===== GRID ===== */
      .page { flex: 1; padding: 16px; max-width: 480px; margin: 0 auto; width: 100%; }

      .grid-container {
        background: var(--card);
        border-radius: 16px;
        padding: 12px;
        border: 1px solid var(--border);
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }

      .cell {
        aspect-ratio: 1;
        background: rgba(0,0,0,0.3);
        border-radius: 12px;
        border: 2px dashed rgba(255,255,255,0.08);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: all 0.15s;
        cursor: default;
        user-select: none;
        overflow: hidden;
      }
      .cell.has-pet {
        border-style: solid;
        border-color: rgba(255,255,255,0.12);
        cursor: grab;
      }
      .cell.has-pet:active { cursor: grabbing; }
      .cell.drag-over {
        border-color: var(--accent) !important;
        background: rgba(79,195,247,0.15) !important;
        transform: scale(1.05);
        box-shadow: 0 0 16px rgba(79,195,247,0.3);
      }
      .cell.dragging {
        opacity: 0.4;
        transform: scale(0.9);
      }

      .pet-avatar {
        font-size: 36px;
        line-height: 1;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        transition: transform 0.2s;
      }
      .cell.has-pet:hover .pet-avatar { transform: scale(1.1); }

      .pet-level {
        font-size: 10px;
        font-weight: 700;
        padding: 1px 6px;
        border-radius: 6px;
        margin-top: 2px;
        color: #fff;
      }
      .pet-name {
        font-size: 10px;
        color: var(--text-dim);
        margin-top: 1px;
        max-width: 100%;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      /* Rarity backgrounds */
      .rarity-common { background: rgba(158,158,158,0.15); border-color: rgba(158,158,158,0.3) !important; }
      .rarity-uncommon { background: rgba(102,187,106,0.15); border-color: rgba(102,187,106,0.3) !important; }
      .rarity-rare { background: rgba(66,165,245,0.15); border-color: rgba(66,165,245,0.3) !important; }
      .rarity-epic { background: rgba(171,71,188,0.15); border-color: rgba(171,71,188,0.3) !important; }
      .rarity-legendary { background: rgba(255,167,38,0.15); border-color: rgba(255,167,38,0.3) !important; }
      .rarity-mythic { background: rgba(239,83,80,0.15); border-color: rgba(239,83,80,0.3) !important; }
      .rarity-supreme { background: rgba(255,215,0,0.15); border-color: rgba(255,215,0,0.4) !important; }

      .badge-common { background: var(--common); }
      .badge-uncommon { background: var(--uncommon); }
      .badge-rare { background: var(--rare); }
      .badge-epic { background: var(--epic); }
      .badge-legendary { background: var(--legendary); }
      .badge-mythic { background: var(--mythic); }
      .badge-supreme { background: linear-gradient(135deg, #ffd700, #ff9800); }

      /* ===== MERGE EFFECT ===== */
      @keyframes merge-burst {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.8); opacity: 0.6; }
        100% { transform: scale(0); opacity: 0; }
      }
      @keyframes merge-pop {
        0% { transform: scale(0); }
        60% { transform: scale(1.3); }
        100% { transform: scale(1); }
      }
      @keyframes merge-ring {
        0% { transform: scale(0.5); opacity: 1; border-width: 4px; }
        100% { transform: scale(2.5); opacity: 0; border-width: 0px; }
      }
      @keyframes sparkle {
        0% { transform: scale(0) rotate(0deg); opacity: 1; }
        50% { transform: scale(1) rotate(180deg); opacity: 1; }
        100% { transform: scale(0) rotate(360deg); opacity: 0; }
      }
      @keyframes float-up {
        0% { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(-40px); opacity: 0; }
      }

      .merge-effect {
        position: absolute;
        inset: 0;
        pointer-events: none;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10;
      }
      .merge-ring {
        position: absolute;
        width: 60%;
        height: 60%;
        border-radius: 50%;
        border: 4px solid var(--accent);
        animation: merge-ring 0.6s ease-out forwards;
      }
      .merge-ring:nth-child(2) { animation-delay: 0.1s; border-color: var(--gold); }
      .merge-sparkle {
        position: absolute;
        font-size: 14px;
        animation: sparkle 0.5s ease-out forwards;
      }
      .merge-text {
        position: absolute;
        top: 5px;
        font-size: 12px;
        font-weight: 700;
        color: var(--gold);
        animation: float-up 0.8s ease-out forwards;
        text-shadow: 0 1px 4px rgba(0,0,0,0.5);
      }

      .new-pet-anim {
        animation: merge-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      /* ===== GRID ACTIONS ===== */
      .grid-actions {
        display: flex;
        gap: 8px;
        margin-top: 12px;
      }
      .grid-actions .btn { flex: 1; }

      /* ===== BUTTONS ===== */
      .btn {
        padding: 10px 16px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .btn:active { transform: scale(0.96); }
      .btn:disabled { opacity: 0.4; cursor: not-allowed; }
      .btn-primary {
        background: linear-gradient(135deg, #4fc3f7, #0288d1);
        color: #fff;
        box-shadow: 0 2px 8px rgba(79,195,247,0.3);
      }
      .btn-primary:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(79,195,247,0.4); }
      .btn-gold {
        background: linear-gradient(135deg, #ffd700, #f57f17);
        color: #1a1a1a;
        box-shadow: 0 2px 8px rgba(255,215,0,0.3);
      }
      .btn-gold:hover:not(:disabled) { box-shadow: 0 4px 16px rgba(255,215,0,0.4); }
      .btn-success {
        background: linear-gradient(135deg, #66bb6a, #2e7d32);
        color: #fff;
      }
      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
      }
      .btn-outline:hover { background: rgba(255,255,255,0.05); }
      .btn-lg { padding: 14px 24px; font-size: 16px; }

      /* ===== SHOP ===== */
      .shop-section { margin-bottom: 24px; }
      .shop-section-title {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 12px;
        color: var(--text-dim);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .egg-card {
        background: var(--card);
        border-radius: 14px;
        padding: 16px;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 10px;
        transition: all 0.2s;
      }
      .egg-card:hover { border-color: rgba(255,255,255,0.2); }
      .egg-icon {
        font-size: 42px;
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: rgba(0,0,0,0.3);
        flex-shrink: 0;
      }
      .egg-info { flex: 1; }
      .egg-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
      .egg-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; }
      .egg-price {
        display: flex;
        align-items: center;
        gap: 4px;
        font-size: 14px;
        font-weight: 700;
        color: var(--gold);
        margin-top: 6px;
      }

      /* ===== DAILY CHECKIN ===== */
      .checkin-banner {
        background: linear-gradient(135deg, #1a3a2a, #0f2a1a);
        border: 1px solid rgba(102,187,106,0.3);
        border-radius: 14px;
        padding: 20px;
        text-align: center;
        margin-bottom: 20px;
      }
      .checkin-banner h3 {
        font-size: 18px;
        margin-bottom: 8px;
        color: var(--success);
      }
      .checkin-banner p {
        font-size: 13px;
        color: var(--text-dim);
        margin-bottom: 12px;
      }
      .checkin-done {
        background: rgba(102,187,106,0.1);
        border-color: rgba(102,187,106,0.5);
      }

      /* ===== COLLECTION ===== */
      .collection-header {
        text-align: center;
        margin-bottom: 20px;
      }
      .collection-progress {
        font-size: 14px;
        color: var(--text-dim);
        margin-top: 4px;
      }
      .collection-bar-bg {
        width: 100%;
        height: 8px;
        background: rgba(0,0,0,0.3);
        border-radius: 4px;
        margin-top: 8px;
        overflow: hidden;
      }
      .collection-bar-fill {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #4fc3f7, #ffd700);
        transition: width 0.5s ease;
      }

      .rarity-group { margin-bottom: 24px; }
      .rarity-group-title {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 10px;
        padding-bottom: 6px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .pet-card-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 8px;
      }
      .pet-card {
        aspect-ratio: 1;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        border: 2px solid var(--border);
        transition: all 0.2s;
        position: relative;
      }
      .pet-card.collected { border-color: rgba(255,255,255,0.15); }
      .pet-card.locked {
        background: rgba(0,0,0,0.4) !important;
        border-color: rgba(255,255,255,0.05) !important;
      }
      .pet-card.locked .pet-avatar { filter: brightness(0) saturate(0); opacity: 0.3; }
      .pet-card .pet-avatar { font-size: 28px; }
      .pet-card .pet-card-name {
        font-size: 9px;
        color: var(--text-dim);
        margin-top: 2px;
      }
      .pet-card .pet-card-level {
        font-size: 8px;
        color: var(--text-dim);
      }
      .lock-icon {
        position: absolute;
        font-size: 16px;
        opacity: 0.4;
      }

      /* ===== ACHIEVEMENTS ===== */
      .achievement-card {
        background: var(--card);
        border-radius: 12px;
        padding: 14px;
        border: 1px solid var(--border);
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        gap: 12px;
        transition: all 0.2s;
      }
      .achievement-card.unlocked {
        border-color: rgba(255,215,0,0.3);
        background: linear-gradient(135deg, rgba(255,215,0,0.05), transparent);
      }
      .achievement-icon {
        font-size: 32px;
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.3);
        border-radius: 10px;
        flex-shrink: 0;
      }
      .achievement-icon.locked-icon { filter: brightness(0.3); }
      .achievement-info { flex: 1; }
      .achievement-name { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
      .achievement-desc { font-size: 12px; color: var(--text-dim); }
      .achievement-reward {
        font-size: 12px;
        color: var(--gold);
        margin-top: 4px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .achievement-status {
        font-size: 20px;
        flex-shrink: 0;
      }

      /* ===== HATCH MODAL ===== */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        padding: 20px;
      }
      .modal-content {
        background: var(--card);
        border-radius: 20px;
        padding: 32px;
        text-align: center;
        max-width: 320px;
        width: 100%;
        border: 1px solid var(--border);
        position: relative;
      }
      .modal-title {
        font-size: 20px;
        font-weight: 700;
        margin-bottom: 16px;
      }
      .hatch-pet {
        font-size: 72px;
        margin: 20px 0;
        animation: merge-pop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      .hatch-name {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }
      .hatch-rarity {
        font-size: 13px;
        padding: 3px 12px;
        border-radius: 12px;
        display: inline-block;
        margin-bottom: 16px;
        color: #fff;
      }

      .confetti {
        position: fixed;
        pointer-events: none;
        z-index: 250;
        font-size: 18px;
        animation: confetti-fall 2s ease-out forwards;
      }
      @keyframes confetti-fall {
        0% { opacity: 1; transform: translateY(0) rotate(0deg); }
        100% { opacity: 0; transform: translateY(200px) rotate(720deg); }
      }

      /* ===== EGG ANIMATION ===== */
      @keyframes egg-wobble {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(-15deg); }
        75% { transform: rotate(15deg); }
      }
      .egg-wobble {
        display: inline-block;
        animation: egg-wobble 0.4s ease-in-out 3;
      }
      @keyframes egg-crack {
        0% { transform: scale(1); }
        30% { transform: scale(1.2); }
        60% { transform: scale(0.8); }
        100% { transform: scale(0); opacity: 0; }
      }
      .egg-crack {
        animation: egg-crack 0.5s ease-in forwards;
      }

      /* ===== TOAST ===== */
      .toast-container {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 300;
        display: flex;
        flex-direction: column;
        gap: 8px;
        pointer-events: none;
      }
      .toast {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 18px;
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        animation: toast-in 0.3s ease-out;
      }
      .toast.toast-out { animation: toast-out 0.3s ease-in forwards; }
      .toast-success { border-color: rgba(102,187,106,0.4); color: var(--success); }
      .toast-gold { border-color: rgba(255,215,0,0.4); color: var(--gold); }
      .toast-info { border-color: rgba(79,195,247,0.4); color: var(--accent); }
      @keyframes toast-in {
        from { opacity: 0; transform: translateY(-20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes toast-out {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-20px); }
      }

      /* ===== HINT ===== */
      .hint-text {
        text-align: center;
        font-size: 12px;
        color: var(--text-dim);
        margin-top: 10px;
        padding: 8px;
        background: rgba(0,0,0,0.2);
        border-radius: 8px;
      }

      /* ===== RESPONSIVE ===== */
      @media (max-width: 360px) {
        .pet-avatar { font-size: 28px; }
        .header-title { font-size: 17px; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
